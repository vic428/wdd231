<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="This website helps in keeping track of courses offered."> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Keywords" content="website, business, vendors, shops">
    <meta name="author" content="Archibong Victor">

    <!--  Essential META Tags -->
    <meta property="og:title" content="Course Home Page"/>
    <meta property="og:type"  content="website" />
    <meta property="og:description" content="Students can manage their courses using this website."/>
    <meta property="og:image" content="https://th.bing.com/th/id/OIP.qmKicII1wObpzXFNnuIIyQHaEE?rs=1&pid=ImgDetMain"/>
    <meta property="og:url"   content="https://vic428.github.io/wdd231/"/>

    <title>Chamber of Commerce</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <!-- Link to external JavaScript file -->
    <link rel="icon" href="favicon.ico">
    <script src="scripts.js" defer></script>
</head>

<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="images/profile-img.jpg" alt="Archibong Victor's Profile Picture" width="60" height="90">
                <h1>Archibong Victor</h1>
            </div>
            
            <nav>
                <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">
                    <span class="line"></span>
                    <span class="line"></span>
                    <span class="line"></span>
                </button>
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Chamber</a></li>
                    <li><a href="https://github.com/vic428/">GitHub Profile</a></li>
                    <li><a href="https://www.linkedin.com/in/archibong-victor/">LinkedIn</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container-2">
            <div class="container-3">
                <section class="coursework">
                    <h2>Course Work</h2>
                    <ul id="courselist">
                        <!-- Dynamically populated with JavaScript -->
                    </ul>
                </section>
            
                <section class="location">
                    <h2>Uyo, Nigeria</h2>
                    <div class="image-container">
                        <img src="images/Uyo-Stadium.jpg" alt="Picture of Uyo Ultra Modern Stadium" width="300" height="200">
                        
                    </div>
                    <p>Uyo Township Stadium</p>
                </section>
            </div>
           
            <div>
                <section class="certificate">
                    <h2>Web and Computer Programming Certificate</h2>
                    <h3>Credits: 12</h3>
                    
                    <div class="filter-buttons">
                        <button id="allCourses">All</button>
                        <button id="cseCourses">CSE</button>
                        <button id="wddCourses">WDD</button>
                    </div>
                 
                    <div id="courseCards" class="course-cards"></div>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p> &copy; <span id="currentyear"></span> 🌸 Archibong Victor 🌸, Nigeria. </p>
            <p id="lastModified"></p>
        </div>
        <div class="flag-container"><img src="images/nig-flag.webp" alt="Nigerian flag" width="45" height="30"></div>
    </footer>
</body>

</html>
